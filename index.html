<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ESP32 Relay + DHT22 Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0 10px 40px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: space-between;
    }
    h1 {
      margin-top: 30px;
      font-size: 1.8rem;
    }
    h3.section-label {
      margin: 30px 0 -5px;
      color: #555;
      font-size: 1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .relay-card {
      display: inline-block;
      background-color: white;
      padding: 20px;
      margin: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 220px;
      vertical-align: top;
    }
    .relay-card h2 {
      margin-bottom: 10px;
      font-size: 1.3rem;
    }
    .relay-card p {
      margin-bottom: 10px;
      font-size: 1rem;
    }
    .relay-card button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      color: white;
      background-color: blue;
      cursor: pointer;
      font-size: 16px;
      width: 90%;
      transition: opacity 0.3s ease;
    }
    .relay-card button:hover {
      opacity: 0.8;
    }

    /* Sensor cards (DHT22) */
    .sensor-card {
      display: inline-block;
      background-color: white;
      padding: 20px;
      margin: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 220px;
      vertical-align: top;
      border-top: 4px solid #1e88e5;
    }
    .sensor-card h2 {
      margin-bottom: 10px;
      font-size: 1.3rem;
    }
    .sensor-card .value {
      font-size: 2.2rem;
      font-weight: bold;
      color: #1e88e5;
      margin: 5px 0;
    }
    .sensor-card .unit {
      font-size: 1rem;
      color: #888;
    }
    .sensor-card .updated {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 8px;
    }

    #allOffBtn {
      max-width: 300px;
      width: 90%;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 15px auto;
      display: block;
      color: white;
      background-color: #d32f2f;
      transition: opacity 0.3s ease;
    }
    #allOffBtn:hover {
      opacity: 0.8;
    }

    /* Responsive layout */
    #dashboard .relay-container,
    #dashboard .sensor-container {
      max-width: 960px;
      margin: 20px auto 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    /* Smaller devices */
    @media (max-width: 700px) {
      .relay-card, .sensor-card {
        width: 90%;
        margin: 10px auto;
        display: block;
      }
      body {
        padding: 0 10px 60px;
      }
    }
    footer {
      font-size: 0.9rem;
      color: #666;
      padding: 10px 0;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <h1>ESP32 Relay + DHT22 Dashboard</h1>

  <!-- Dashboard -->
  <div id="dashboard">

    <h3 class="section-label">Relays</h3>
    <div class="relay-container">
      <div class="relay-card">
        <h2>Relay 1</h2>
        <p>Status: <span id="status1">Loading...</span></p>
        <button id="btn1">Toggle</button>
      </div>
    </div>

    <h3 class="section-label">DHT22 Sensor</h3>
    <div class="sensor-container">
      <div class="sensor-card">
        <h2>Temperature</h2>
        <div class="value"><span id="tempValue">--</span><span class="unit"> &deg;C</span></div>
        <div class="updated">Updated: <span id="tempUpdated">--</span></div>
      </div>

      <div class="sensor-card">
        <h2>Humidity</h2>
        <div class="value"><span id="humValue">--</span><span class="unit"> %</span></div>
        <div class="updated">Updated: <span id="humUpdated">--</span></div>
      </div>
    </div>

    <button id="allOffBtn">All OFF</button>
  </div>

  <footer>
    Created by Tech StudyCell
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyB_lsKdY8yZYwXD-XTNV6b5kKIeOgP4x24",
      authDomain: "esp32-relay-control-01-b96b1.firebaseapp.com",
      databaseURL: "https://esp32-relay-control-01-b96b1-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "esp32-relay-control-01-b96b1",
      storageBucket: "esp32-relay-control-01-b96b1.firebasestorage.app",
      messagingSenderId: "327054806162",
      appId: "1:327054806162:web:6a7935f023ef8b5d2aaa4b",
      measurementId: "G-R93LCX5MB1"
    };

    firebase.initializeApp(firebaseConfig);

    // No login required - start the dashboard right away
    startRelayControl();
    startSensorDisplay();

    function formatTime() {
      const now = new Date();
      return now.toLocaleTimeString();
    }

    function startRelayControl() {
      const db = firebase.database();

      // Only relay1 exists in the ESP32 firmware
      const relays = [
        { id: 1, path: "relay1" },
      ];

      relays.forEach(relay => {
        const statusText = document.getElementById(`status${relay.id}`);
        const toggleButton = document.getElementById(`btn${relay.id}`);
        const relayRef = db.ref("/" + relay.path);

        relayRef.on("value", (snapshot) => {
          const state = snapshot.val();
          statusText.innerText = state ? "ON" : "OFF";
          toggleButton.style.backgroundColor = state ? "green" : "blue";
        });

        toggleButton.onclick = () => {
          relayRef.get().then(snap => {
            relayRef.set(!snap.val());
          });
        };
      });

      document.getElementById("allOffBtn").onclick = () => {
        relays.forEach(relay => {
          db.ref("/" + relay.path).set(false);
        });
      };
    }

    function startSensorDisplay() {
      const db = firebase.database();

      // Temperature -> /temperature (set by dht.readTemperature() in the firmware)
      db.ref("/temperature").on("value", (snapshot) => {
        const val = snapshot.val();
        document.getElementById("tempValue").innerText =
          (val === null || val === undefined) ? "--" : Number(val).toFixed(1);
        document.getElementById("tempUpdated").innerText = formatTime();
      });

      // Humidity -> /humidity (set by dht.readHumidity() in the firmware)
      db.ref("/humidity").on("value", (snapshot) => {
        const val = snapshot.val();
        document.getElementById("humValue").innerText =
          (val === null || val === undefined) ? "--" : Number(val).toFixed(1);
        document.getElementById("humUpdated").innerText = formatTime();
      });
    }
  </script>
</body>
</html>
